python_codes:
  auto_label_script_path: "import argparse\nimport cv2\nfrom pathlib import Path\n\
    from ultralytics import YOLO  # Ensure you have installed ultralytics (pip install\
    \ ultralytics)\nfrom tqdm import tqdm  # Progress bar\n\ndef convert_to_yolo_format(box,\
    \ img_width, img_height):\n    \"\"\"\n    Convert box coordinates from (x1, y1,\
    \ x2, y2) to YOLO format:\n    (class, center_x, center_y, width, height) where\
    \ coordinates are normalized.\n    \"\"\"\n    # Extract coordinates\n    x1,\
    \ y1, x2, y2 = box.xyxy[0].cpu().numpy()\n    # Calculate center, width, and height\n\
    \    center_x = (x1 + x2) / 2.0 / img_width\n    center_y = (y1 + y2) / 2.0 /\
    \ img_height\n    box_width = (x2 - x1) / img_width\n    box_height = (y2 - y1)\
    \ / img_height\n    # Get the predicted class (as integer)\n    cls = int(box.cls[0].item())\n\
    \    return cls, center_x, center_y, box_width, box_height\n\ndef process_images(model_weights,\
    \ images_dir, labels_dir, gpu_number):\n    # Create the labels directory if it\
    \ doesn't exist\n    labels_dir = Path(labels_dir)\n    labels_dir.mkdir(parents=True,\
    \ exist_ok=True)\n    print(f\"Labels directory is set to: {labels_dir.resolve()}\"\
    )\n\n    # Load the YOLO model on the specified GPU device\n    device = f\"cuda:{gpu_number}\"\
    \ if gpu_number >= 0 else \"cpu\"\n    print(f\"Loading model weights from {model_weights}\
    \ on device {device}...\")\n    model = YOLO(model_weights).to(device)\n    print(\"\
    Model loaded successfully.\\n\")\n\n    # Process each image with extension png,\
    \ jpg, or jpeg\n    images_path = Path(images_dir)\n    image_files = [p for p\
    \ in images_path.iterdir() if p.suffix.lower() in [\".png\", \".jpg\", \".jpeg\"\
    ]]\n    if not image_files:\n        print(\"No images found in the specified\
    \ directory.\")\n        return\n\n    print(f\"Found {len(image_files)} images.\
    \ Starting processing...\")\n    for img_path in tqdm(image_files, desc=\"Processing\
    \ images\"):\n        # Read image to get dimensions\n        image = cv2.imread(str(img_path))\n\
    \        if image is None:\n            print(f\"Warning: Unable to read {img_path}\"\
    )\n            continue\n        img_height, img_width = image.shape[:2]\n\n \
    \       # Run inference on the image using the model\n        results = model.predict(str(img_path),\
    \ verbose=False)\n        # For each detected box, convert and save in YOLO format\n\
    \        label_file = labels_dir / f\"{img_path.stem}.txt\"\n        with open(label_file,\
    \ \"w\") as f:\n            # Assuming results[0] corresponds to the processed\
    \ image\n            boxes = results[0].boxes\n            for box in boxes:\n\
    \                cls, center_x, center_y, box_width, box_height = convert_to_yolo_format(box,\
    \ img_width, img_height)\n                # Write the detection in YOLO format:\
    \ class center_x center_y width height\n                f.write(f\"{cls} {center_x:.6f}\
    \ {center_y:.6f} {box_width:.6f} {box_height:.6f}\\n\")\n    print(\"All images\
    \ processed successfully.\")\n\nif __name__ == \"__main__\":\n    parser = argparse.ArgumentParser(\n\
    \        description=\"Auto-label images using a YOLO model and save detections\
    \ in YOLO format.\"\n    )\n    parser.add_argument(\"--model_weights_path\",\
    \ help=\"Path to the YOLO model weights file\", required=True)\n    parser.add_argument(\"\
    --images_dir_path\", help=\"Path to the directory containing images (PNG/JPG)\"\
    , required=True)\n    parser.add_argument(\"--labels_save_path\", help=\"Path\
    \ to the directory where label files will be saved\", required=True)\n    parser.add_argument(\"\
    --gpu_number\", type=int, default=0, help=\"GPU number to use. Set to -1 to use\
    \ CPU.\")\n    args = parser.parse_args()\n\n    process_images(args.model_weights_path,\
    \ args.images_dir_path, args.labels_save_path, args.gpu_number)\n"
  combine_dataset_script_path: "import os\nimport shutil\nfrom pathlib import Path\n\
    from tqdm import tqdm\nimport argparse\n\ndef combine_yolo_dirs(yolo_dirs, dst_dir):\n\
    \    \"\"\"\n    Combine two YOLO directories into a single destination directory\
    \ with prefixed filenames.\n    Resolves duplicate prefixes by appending a higher-level\
    \ directory name to make them unique.\n\n    Args:\n        yolo_dirs (list of\
    \ str): List of two YOLO directories to combine. Each directory must contain 'images'\
    \ and 'labels' subdirectories.\n        dst_dir (str): Destination directory where\
    \ combined files will be saved.\n    \"\"\"\n    dst_images_dir = Path(dst_dir)\
    \ / \"images\"\n    dst_labels_dir = Path(dst_dir) / \"labels\"\n\n    # Create\
    \ destination subdirectories if they don't exist\n    dst_images_dir.mkdir(parents=True,\
    \ exist_ok=True)\n    dst_labels_dir.mkdir(parents=True, exist_ok=True)\n\n  \
    \  # Determine unique prefixes for each dataset\n    prefixes = {}\n    for yolo_dir\
    \ in yolo_dirs:\n        yolo_path = Path(yolo_dir)\n        prefix = f\"{yolo_path.parent.name}_{yolo_path.name}\"\
    \n        # Ensure the prefix is unique\n        while prefix in prefixes.values():\n\
    \            prefix = f\"{Path(yolo_path.parent.parent).name}_{prefix}\"\n   \
    \     if prefix.startswith(\"_\"):\n            prefix = prefix[1:]\n        prefixes[yolo_dir]\
    \ = prefix\n\n    # Process each YOLO directory\n    for yolo_dir, prefix in prefixes.items():\n\
    \        yolo_path = Path(yolo_dir)\n        images_dir = yolo_path / \"images\"\
    \n        labels_dir = yolo_path / \"labels\"\n\n        # Check if subdirectories\
    \ exist\n        if not images_dir.exists() or not labels_dir.exists():\n    \
    \        print(f\"Skipping {yolo_dir}: Missing 'images' or 'labels' directory.\"\
    )\n            continue\n\n        # Copy images with new prefixed filenames\n\
    \        image_files = list(images_dir.glob(\"*.*\"))  # Match all files\n   \
    \     for image_file in tqdm(image_files, desc=f\"Copying images from {yolo_dir}\"\
    , unit=\"file\"):\n            new_name = f\"{prefix}_{image_file.name}\"\n  \
    \          shutil.copy(image_file, dst_images_dir / new_name)\n\n        # Copy\
    \ labels with new prefixed filenames\n        label_files = list(labels_dir.glob(\"\
    *.*\"))  # Match all files\n        for label_file in tqdm(label_files, desc=f\"\
    Copying labels from {yolo_dir}\", unit=\"file\"):\n            new_name = f\"\
    {prefix}_{label_file.name}\"\n            shutil.copy(label_file, dst_labels_dir\
    \ / new_name)\n\n    print(f\"All files have been combined and saved to {dst_dir}.\"\
    )\n\nif __name__ == \"__main__\":\n    parser = argparse.ArgumentParser(description=\"\
    Combine two YOLO dataset directories into one.\")\n    parser.add_argument(\"\
    --dataset1\", help=\"Path to the first YOLO dataset directory\")\n    parser.add_argument(\"\
    --dataset2\", help=\"Path to the second YOLO dataset directory\")\n    parser.add_argument(\"\
    --dst_dir\", help=\"Destination directory where combined files will be saved\"\
    )\n    args = parser.parse_args()\n\n    combine_yolo_dirs([args.dataset1, args.dataset2],\
    \ args.dst_dir)\n"
  mp4_script_path: "import cv2\nimport os\nimport argparse\nfrom tqdm import tqdm\n\
    \ndef extract_frames(video_path, output_folder):\n    \"\"\"\n    Extracts frames\
    \ from an MP4 video and saves them as PNG images.\n\n    Args:\n        video_path\
    \ (str): Path to the input MP4 video.\n        output_folder (str): Path to the\
    \ folder where images will be saved.\n    \"\"\"\n    # Ensure the output directory\
    \ exists\n    os.makedirs(output_folder, exist_ok=True)\n\n    # Open the video\
    \ file\n    video_capture = cv2.VideoCapture(video_path)\n    if not video_capture.isOpened():\n\
    \        print(f\"Error: Could not open video file {video_path}\")\n        return\n\
    \n    frame_count = int(video_capture.get(cv2.CAP_PROP_FRAME_COUNT))\n    \n \
    \   # Initialize tqdm progress bar\n    progress_bar = tqdm(total=frame_count,\
    \ desc=\"Extracting frames\", unit=\"frame\")\n\n    frame_index = 0\n    while\
    \ True:\n        ret, frame = video_capture.read()\n        if not ret:\n    \
    \        break\n\n        # Save the frame as a PNG file\n        frame_filename\
    \ = os.path.join(output_folder, f\"frame_{frame_index:05d}.png\")\n        cv2.imwrite(frame_filename,\
    \ frame)\n\n        frame_index += 1\n        progress_bar.update(1)\n\n    progress_bar.close()\n\
    \    video_capture.release()\n\n    progress_bar.close()\n    print()  \n    print(f\"\
    Saved images to: {output_folder}\")\n    print()\n\ndef main():\n    parser =\
    \ argparse.ArgumentParser(\n        description=\"Extract frames from an MP4 video\
    \ and save them as PNG images.\"\n    )\n    parser.add_argument(\"--video_path\"\
    , type=str, required=True, help=\"Path to the input MP4 video.\")\n    parser.add_argument(\"\
    --output_folder\", type=str, required=True, help=\"Path to the folder where images\
    \ will be saved.\")\n    args = parser.parse_args()\n\n    extract_frames(args.video_path,\
    \ args.output_folder)\n\nif __name__ == \"__main__\":\n    main()\n"
  rotate_images_script_path: "import os\nimport argparse\nfrom PIL import Image\n\
    from tqdm import tqdm\n\ndef rotate_image(image_path, rotation_type):\n    \"\"\
    \"Rotates an image based on the specified rotation type and saves it in place.\"\
    \"\"\n    try:\n        with Image.open(image_path) as img:\n            if rotation_type\
    \ == 'CW':\n                rotated_img = img.rotate(-90, expand=True)  # Clockwise\
    \ 90 degrees\n            elif rotation_type == 'CCW':\n                rotated_img\
    \ = img.rotate(90, expand=True)  # Counterclockwise 90 degrees\n            elif\
    \ rotation_type == '180':\n                rotated_img = img.rotate(180, expand=True)\
    \  # 180-degree rotation\n            else:\n                print(f\"Invalid\
    \ rotation type: {rotation_type}\")\n                return\n\n            rotated_img.save(image_path)\n\
    \    \n    except Exception as e:\n        print(f\"Error processing {image_path}:\
    \ {e}\")\n\ndef process_images(directory, rotation_type):\n    \"\"\"Processes\
    \ all images in the directory and applies the specified rotation.\"\"\"\n    if\
    \ not os.path.exists(directory):\n        print(f\"Directory '{directory}' does\
    \ not exist.\")\n        return\n\n    valid_extensions = ('.jpg', '.jpeg', '.png')\n\
    \    image_files = [f for f in os.listdir(directory) if f.lower().endswith(valid_extensions)]\n\
    \n    if not image_files:\n        print(\"No valid image files found in the directory.\"\
    )\n        return\n\n    for filename in tqdm(image_files, desc=\"Processing Images\"\
    , unit=\"file\"):\n        image_path = os.path.join(directory, filename)\n  \
    \      rotate_image(image_path, rotation_type)\n\nif __name__ == \"__main__\"\
    :\n    parser = argparse.ArgumentParser(description=\"Rotate images in a directory\"\
    )\n    parser.add_argument(\"--directory\", type=str, required=True, help=\"Path\
    \ to the directory containing images\")\n    parser.add_argument(\"--rotation\"\
    , type=str, choices=['CW', 'CCW', '180'], required=True, \n                  \
    \      help=\"Rotation type: CW (90\xB0 Clockwise), CCW (90\xB0 Counterclockwise),\
    \ or 180 (180\xB0 Rotation)\")\n\n    args = parser.parse_args()\n    process_images(args.directory,\
    \ args.rotation)\n"
  split_data_script_path: "import os\nimport shutil\nimport argparse\nfrom tqdm import\
    \ tqdm\n\ndef is_valid_line(line):\n    \"\"\"Check if a line contains valid YOLO\
    \ format data.\"\"\"\n    parts = line.strip().split()\n    # A valid line should\
    \ have at least one number (class ID)\n    return len(parts) > 0 and all(part.replace('.',\
    \ '', 1).isdigit() for part in parts)\n\ndef categorize_images(yolo_dir, output_dir_with_objects,\
    \ output_dir_no_objects, images_subdir=\"images\", labels_subdir=\"labels\"):\n\
    \    # Create output directories with subdirectories for images and labels\n \
    \   output_images_with_objects = os.path.join(output_dir_with_objects, images_subdir)\n\
    \    output_labels_with_objects = os.path.join(output_dir_with_objects, labels_subdir)\n\
    \    output_images_no_objects = os.path.join(output_dir_no_objects, images_subdir)\n\
    \    output_labels_no_objects = os.path.join(output_dir_no_objects, labels_subdir)\n\
    \    \n    os.makedirs(output_images_with_objects, exist_ok=True)\n    os.makedirs(output_labels_with_objects,\
    \ exist_ok=True)\n    os.makedirs(output_images_no_objects, exist_ok=True)\n \
    \   os.makedirs(output_labels_no_objects, exist_ok=True)\n\n    # Get paths to\
    \ images and labels\n    images_path = os.path.join(yolo_dir, images_subdir)\n\
    \    labels_path = os.path.join(yolo_dir, labels_subdir)\n\n    if not os.path.exists(images_path):\n\
    \        print(\"Images directory is missing. Please check the input path.\")\n\
    \        return\n\n    # Process each image file in the images directory\n   \
    \ for image_file in tqdm(os.listdir(images_path), desc=\"Categorizing image/label\
    \ pairs\"):\n        if image_file.lower().endswith(('.jpg', '.jpeg', '.png')):\n\
    \            image_path = os.path.join(images_path, image_file)\n            #\
    \ Assume corresponding label file has the same name but with .txt extension\n\
    \            label_file = os.path.splitext(image_file)[0] + '.txt'\n         \
    \   label_path = os.path.join(labels_path, label_file)\n            \n       \
    \     if os.path.exists(label_path):\n                with open(label_path, 'r')\
    \ as file:\n                    lines = file.readlines()\n                valid_lines\
    \ = [line for line in lines if is_valid_line(line)]\n                if valid_lines:\
    \  # Label file contains valid objects\n                    shutil.copy(image_path,\
    \ os.path.join(output_images_with_objects, image_file))\n                    shutil.copy(label_path,\
    \ os.path.join(output_labels_with_objects, label_file))\n                else:\
    \  # Label file exists but no valid objects\n                    shutil.copy(image_path,\
    \ os.path.join(output_images_no_objects, image_file))\n                    # Create\
    \ an empty label file in the no-objects directory\n                    empty_label_path\
    \ = os.path.join(output_labels_no_objects, label_file)\n                    open(empty_label_path,\
    \ 'w').close()\n            else:\n                # No label file exists: treat\
    \ as image with no objects\n                shutil.copy(image_path, os.path.join(output_images_no_objects,\
    \ image_file))\n                # Create a blank label file in the no-objects\
    \ directory\n                empty_label_path = os.path.join(output_labels_no_objects,\
    \ label_file)\n                open(empty_label_path, 'w').close()\n\ndef main():\n\
    \    parser = argparse.ArgumentParser(\n        description=\"Categorize YOLO\
    \ images into two groups: with valid objects and without valid objects.\"\n  \
    \  )\n    parser.add_argument('--data_path', help=\"Path to the YOLO directory\
    \ containing 'images' and 'labels' subdirectories\")\n    parser.add_argument('--save_path',\
    \ help=\"Directory where the categorized outputs will be saved\")\n    args =\
    \ parser.parse_args()\n\n    yolo_dir = args.data_path\n    output_dir_with_objects\
    \ = os.path.join(args.save_path, \"output_with_objects\")\n    output_dir_no_objects\
    \ = os.path.join(args.save_path, \"output_no_objects\")\n    \n    categorize_images(yolo_dir,\
    \ output_dir_with_objects, output_dir_no_objects)\n\nif __name__ == \"__main__\"\
    :\n    main()\n"
  train_script_path: "import argparse\nfrom ultralytics import YOLO\n\ndef main(model_path,\
    \ data_path, train_path):\n    # Load a model from the given model configuration\
    \ file\n    model = YOLO(model_path)\n    # Train the model using the specified\
    \ training and data configuration files\n    model.train(cfg=train_path, data=data_path)\n\
    \nif __name__ == \"__main__\":\n    parser = argparse.ArgumentParser(description=\"\
    Train a YOLO model using ultralytics\")\n    parser.add_argument(\n        \"\
    --model_path\",\n        type=str,\n        default=\"cfgs/yolo/model/hololens_combined_v11.yaml\"\
    ,\n        help=\"Path to the model configuration file\"\n    )\n    parser.add_argument(\n\
    \        \"--data_path\",\n        type=str,\n        default=\"cfgs/yolo/data/hololens_combined.yaml\"\
    ,\n        help=\"Path to the data configuration file\"\n    )\n    parser.add_argument(\n\
    \        \"--train_path\",\n        type=str,\n        default=\"cfgs/yolo/train/hololend_combined_v11.yaml\"\
    ,\n        help=\"Path to the training configuration file\"\n    )\n    args =\
    \ parser.parse_args()\n    main(args.model_path, args.data_path, args.train_path)\n"
